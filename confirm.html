<!doctype html><html lang="it"><head><meta charset="UTF-8"/><title>CitaTesi</title><script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script><style>*{box-sizing:border-box;margin:0;padding:0}body,html{height:100%}body{font-family:"Segoe UI",-apple-system,BlinkMacSystemFont,sans-serif;background:#fff;color:#1a1a1a;display:flex;flex-direction:column}.card{flex:1;background:#fff;display:flex;flex-direction:column;min-height:0}header{flex-shrink:0;display:flex;align-items:center;gap:.55rem;padding:.5rem .85rem;border-bottom:1px solid #ececec;background:linear-gradient(180deg,#fbf5f5 0,#f7ebeb 100%);border-bottom-color:#ecd6d6}.marchio{width:20px;height:20px;flex-shrink:0;object-fit:contain}.title-wrap{display:flex;flex-direction:column;gap:0;min-width:0}.title{font-size:.92rem;font-weight:600;color:#8b1a1a;line-height:1.2}.subtitle{font-size:.68rem;color:#888;letter-spacing:.03em;text-transform:uppercase;font-weight:500}.body{flex:1 1 auto;min-height:0;overflow-y:auto;padding:.7rem .9rem;font-size:.85rem;line-height:1.4;color:#2c2c2c;white-space:pre-wrap}footer{flex-shrink:0;padding:.45rem .85rem;display:flex;gap:.4rem;justify-content:flex-end;background:#fcfcfc;border-top:1px solid #ececec}button{padding:.35em 1.2em;border:none;border-radius:4px;cursor:pointer;font-size:.85rem;font-family:inherit;font-weight:500;transition:background .15s}button.primary{background:#8b1a1a;color:#fff}button.primary:hover{background:#6e1414}button.primary:focus-visible{outline:3px solid rgba(139,26,26,.25);outline-offset:2px}button.secondary{background:#f0f0f0;color:#2c2c2c;border:1px solid #d0d0d0}button.secondary:hover{background:#e6e6e6}button.secondary:focus-visible{outline:3px solid rgba(0,0,0,.15);outline-offset:2px}</style></head><body><div class="card"><header><img class="marchio" src="assets/MARCHIO_UNITELMA.png" alt=""/> <span class="title">Conferma</span></header><div class="body" id="msg">&nbsp;</div><footer><button id="cancelBtn" class="secondary" type="button">Annulla</button> <button id="confirmBtn" class="primary" type="button">Sì</button></footer></div><script>Office.onReady(function(){var e=new URLSearchParams(window.location.search),t=e.get("msg")||"",n=e.get("confirm")||"Sì",c=e.get("cancel")||"Annulla";document.getElementById("msg").textContent=t,document.getElementById("confirmBtn").textContent=n,document.getElementById("cancelBtn").textContent=c,document.getElementById("confirmBtn").addEventListener("click",function(){Office.context.ui.messageParent("yes")}),document.getElementById("cancelBtn").addEventListener("click",function(){Office.context.ui.messageParent("no")})})</script></body></html>
